<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 15px; font-weight: 700; fill: #222; }
    .rg-label { font-size: 13px; font-weight: 600; fill: #333; }
    .status { font-size: 11px; fill: #666; }
    .waste { font-size: 11px; fill: #c0392b; font-weight: 600; }
    .good { font-size: 11px; fill: #27ae60; font-weight: 600; }
  </style>

  <!-- BEFORE -->
  <text class="title" x="30" y="30">Before Limit Pruning</text>
  <line x1="30" y1="38" x2="370" y2="38" stroke="#ddd" stroke-width="1"/>

  <!-- RG1 - Skipped -->
  <rect x="30" y="55" width="100" height="50" rx="5" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4"/>
  <text class="rg-label" x="80" y="77" text-anchor="middle" fill="#999">RG1</text>
  <text class="status" x="80" y="92" text-anchor="middle" fill="#999">Skipped</text>

  <!-- RG2 - Scanned (wasted) -->
  <rect x="145" y="55" width="100" height="50" rx="5" fill="#fde8e8" stroke="#c0392b" stroke-width="2"/>
  <text class="rg-label" x="195" y="77" text-anchor="middle">RG2</text>
  <text class="waste" x="195" y="92" text-anchor="middle">Scanned</text>
  <text class="waste" x="195" y="120" text-anchor="middle">0 hits - WASTED</text>

  <!-- RG3 - Scanned (hits) -->
  <rect x="260" y="55" width="100" height="50" rx="5" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text class="rg-label" x="310" y="77" text-anchor="middle">RG3</text>
  <text class="good" x="310" y="92" text-anchor="middle">3 hits</text>
  <text class="good" x="310" y="120" text-anchor="middle">Early return</text>

  <!-- RG4 - Not touched -->
  <rect x="375" y="55" width="100" height="50" rx="5" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4"/>
  <text class="rg-label" x="425" y="77" text-anchor="middle" fill="#999">RG4</text>
  <text class="status" x="425" y="92" text-anchor="middle" fill="#999">Not touched</text>

  <!-- Arrow showing scan order -->
  <text x="80" y="140" text-anchor="middle" font-size="18" fill="#bbb">&#8680;</text>
  <text x="195" y="140" text-anchor="middle" font-size="18" fill="#c0392b">&#8680;</text>
  <text x="310" y="140" text-anchor="middle" font-size="18" fill="#27ae60">&#9632;</text>

  <!-- Divider -->
  <line x1="30" y1="165" x2="770" y2="165" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="8"/>

  <!-- AFTER -->
  <text class="title" x="30" y="200">With Limit Pruning</text>
  <line x1="30" y1="208" x2="370" y2="208" stroke="#ddd" stroke-width="1"/>

  <!-- RG1 - Skipped -->
  <rect x="30" y="225" width="100" height="50" rx="5" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4"/>
  <text class="rg-label" x="80" y="247" text-anchor="middle" fill="#999">RG1</text>
  <text class="status" x="80" y="262" text-anchor="middle" fill="#999">Skipped</text>

  <!-- RG2 - Skipped by limit -->
  <rect x="145" y="225" width="100" height="50" rx="5" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4"/>
  <text class="rg-label" x="195" y="247" text-anchor="middle" fill="#999">RG2</text>
  <text class="status" x="195" y="262" text-anchor="middle" fill="#e67e22">Limit-pruned</text>

  <!-- RG3 - Scanned (hits) -->
  <rect x="260" y="225" width="100" height="50" rx="5" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
  <text class="rg-label" x="310" y="247" text-anchor="middle">RG3</text>
  <text class="good" x="310" y="262" text-anchor="middle">3 hits</text>
  <text class="good" x="310" y="290" text-anchor="middle">Fully matched (3) >= Limit (3)</text>

  <!-- RG4 - Skipped by limit -->
  <rect x="375" y="225" width="100" height="50" rx="5" fill="#f5f5f5" stroke="#bbb" stroke-width="1" stroke-dasharray="4"/>
  <text class="rg-label" x="425" y="247" text-anchor="middle" fill="#999">RG4</text>
  <text class="status" x="425" y="262" text-anchor="middle" fill="#e67e22">Limit-pruned</text>

  <!-- Result label -->
  <rect x="530" y="230" width="240" height="40" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="650" y="246" text-anchor="middle" font-size="12" font-weight="600" fill="#27ae60" font-family="'Segoe UI', Arial, sans-serif">Only 1 row group scanned.</text>
  <text x="650" y="261" text-anchor="middle" font-size="12" font-weight="600" fill="#27ae60" font-family="'Segoe UI', Arial, sans-serif">Zero waste.</text>
</svg>
