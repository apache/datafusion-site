<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .stage { fill: #f0f4ff; stroke: #4a7bcc; stroke-width: 1.5; rx: 8; }
    .highlight { fill: #fff3e0; stroke: #e67e22; stroke-width: 2; rx: 8; }
    .label { font-size: 12px; fill: #333; text-anchor: middle; font-weight: 600; }
    .sublabel { font-size: 10px; fill: #777; text-anchor: middle; }
  </style>
  <!-- Partition Pruning -->
  <rect class="stage" x="5" y="15" width="120" height="55"/>
  <text class="label" x="65" y="38">Partition</text>
  <text class="label" x="65" y="53">Pruning</text>
  <text class="sublabel" x="65" y="85">Directory</text>
  <line x1="130" y1="42" x2="155" y2="42" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- File Stats Pruning -->
  <rect class="stage" x="160" y="15" width="120" height="55"/>
  <text class="label" x="220" y="38">File Stats</text>
  <text class="label" x="220" y="53">Pruning</text>
  <text class="sublabel" x="220" y="85">File</text>
  <line x1="285" y1="42" x2="310" y2="42" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- RG Stats Pruning -->
  <rect class="stage" x="315" y="15" width="120" height="55"/>
  <text class="label" x="375" y="38">Row Group</text>
  <text class="label" x="375" y="53">Stats + Bloom</text>
  <text class="sublabel" x="375" y="85">Row Group</text>
  <line x1="440" y1="42" x2="465" y2="42" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Limit Pruning (highlighted) -->
  <rect class="highlight" x="470" y="10" width="120" height="65"/>
  <text class="label" x="530" y="33" fill="#c0392b" font-size="13">Limit</text>
  <text class="label" x="530" y="48" fill="#c0392b" font-size="13">Pruning</text>
  <text class="sublabel" x="530" y="62" fill="#e67e22">NEW</text>
  <text class="sublabel" x="530" y="90">Row Group</text>
  <line x1="595" y1="42" x2="620" y2="42" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Page Index Pruning -->
  <rect class="stage" x="625" y="15" width="120" height="55"/>
  <text class="label" x="685" y="38">Page Index</text>
  <text class="label" x="685" y="53">Pruning</text>
  <text class="sublabel" x="685" y="85">Page</text>
  <line x1="750" y1="42" x2="775" y2="42" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Row Filter -->
  <rect class="stage" x="780" y="15" width="110" height="55"/>
  <text class="label" x="835" y="38">Row</text>
  <text class="label" x="835" y="53">Filter</text>
  <text class="sublabel" x="835" y="85">Row</text>
  <!-- Bottom label -->
  <text x="450" y="112" text-anchor="middle" font-size="11" fill="#999" font-family="'Segoe UI', Arial, sans-serif">Narrowing scope: Directory → File → Row Group → Page → Row</text>
</svg>
