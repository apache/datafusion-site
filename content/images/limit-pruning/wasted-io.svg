<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <marker id="a-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
  </style>

  <!-- Funnel top -->
  <polygon points="260,10 540,10 540,48 260,48" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Funnel body -->
  <polygon points="260,48 540,48 460,130 340,130" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Funnel neck -->
  <rect x="375" y="130" width="50" height="25" fill="#fff" stroke="#333" stroke-width="2"/>

  <!-- Dots inside funnel - top row -->
  <circle cx="310" cy="32" r="5" fill="#333"/>
  <circle cx="350" cy="28" r="7" fill="#333"/>
  <circle cx="395" cy="32" r="5" fill="#333"/>
  <circle cx="435" cy="26" r="8" fill="#333"/>
  <circle cx="475" cy="32" r="6" fill="#333"/>
  <circle cx="510" cy="30" r="5" fill="#333"/>
  <!-- Second row -->
  <circle cx="300" cy="62" r="4" fill="#333"/>
  <circle cx="330" cy="72" r="6" fill="#333"/>
  <circle cx="365" cy="62" r="8" fill="#333"/>
  <circle cx="400" cy="68" r="5" fill="#333"/>
  <circle cx="432" cy="75" r="7" fill="#333"/>
  <circle cx="465" cy="62" r="4" fill="#333"/>
  <circle cx="495" cy="70" r="6" fill="#333"/>
  <circle cx="518" cy="65" r="3" fill="#333"/>
  <!-- Third row -->
  <circle cx="355" cy="92" r="5" fill="#333"/>
  <circle cx="385" cy="88" r="7" fill="#333"/>
  <circle cx="415" cy="95" r="4" fill="#333"/>
  <circle cx="445" cy="86" r="6" fill="#333"/>
  <circle cx="470" cy="93" r="3" fill="#333"/>
  <!-- Fourth row -->
  <circle cx="375" cy="112" r="5" fill="#333"/>
  <circle cx="405" cy="108" r="6" fill="#333"/>
  <circle cx="435" cy="115" r="4" fill="#333"/>

  <!-- Dots falling from funnel -->
  <circle cx="398" cy="163" r="3" fill="#333"/>
  <circle cx="403" cy="177" r="2.5" fill="#333"/>
  <circle cx="399" cy="190" r="2" fill="#333"/>

  <!-- Label: The Pipeline — arrow stops at funnel edge -->
  <text x="225" y="34" text-anchor="end" font-size="13" fill="#666">The Pipeline</text>
  <line x1="230" y1="30" x2="254" y2="30" stroke="#666" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- Output container -->
  <rect x="260" y="206" width="280" height="65" rx="0" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Divider -->
  <line x1="432" y1="206" x2="432" y2="271" stroke="#333" stroke-width="1.5"/>

  <!-- Full section - big dots (left) -->
  <circle cx="295" cy="238" r="10" fill="#333"/>
  <circle cx="325" cy="238" r="12" fill="#333"/>
  <circle cx="358" cy="238" r="11" fill="#333"/>
  <circle cx="388" cy="238" r="10" fill="#333"/>
  <circle cx="415" cy="238" r="9" fill="#333"/>

  <!-- Partial section - mixed dots (right) -->
  <circle cx="452" cy="232" r="8" fill="#333"/>
  <circle cx="478" cy="242" r="12" fill="#333"/>
  <circle cx="508" cy="232" r="5" fill="#333"/>
  <circle cx="525" cy="248" r="3" fill="#333"/>
  <!-- Dots falling below (wasted) -->
  <circle cx="462" cy="280" r="3" fill="#333"/>
  <circle cx="482" cy="285" r="4" fill="#333"/>
  <circle cx="502" cy="282" r="2.5" fill="#333"/>
  <circle cx="522" cy="288" r="2" fill="#333"/>
  <circle cx="472" cy="295" r="2" fill="#333"/>

  <!-- Bottom line -->
  <line x1="260" y1="271" x2="540" y2="271" stroke="#333" stroke-width="3"/>

  <!-- Label: Full (5) — arrow stops at box left edge -->
  <text x="225" y="225" text-anchor="end" font-size="12" fill="#555">Full (5)</text>
  <line x1="230" y1="222" x2="254" y2="222" stroke="#555" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- Label: Query Output (Limit 5) — arrow stops at box left edge -->
  <text x="225" y="250" text-anchor="end" font-size="12" fill="#555">Query Output (Limit 5)</text>
  <line x1="230" y1="247" x2="254" y2="247" stroke="#555" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- Highlight partial section with red dashed border -->
  <rect x="433" y="207" width="106" height="63" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5"/>

  <!-- Wasted CPU & I/O with arrow pointing to partial section -->
  <text x="620" y="225" font-size="16" font-weight="700" fill="#c0392b">Wasted CPU &amp; I/O</text>
  <line x1="590" y1="222" x2="545" y2="235" stroke="#c0392b" stroke-width="1.5" marker-end="url(#a-red)"/>

  <!-- Caption -->
  <text x="400" y="330" text-anchor="middle" font-size="12" fill="#888">Traditional pruning decodes 'Partially Matching' groups with no awareness of LIMIT.</text>
</svg>
