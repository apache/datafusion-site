<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title    { font-size: 15px; font-weight: 700; fill: #222; }
