    .legend    { font-size: 12px; fill: #444; }
    .summary   { font-size: 12px; fill: #444; }
  </style>

  <text class="title" x="500" y="24" text-anchor="middle">topk_tpch (TPC-H SF1, ORDER BY … LIMIT 100) — main vs runtime row-group pruning</text>

