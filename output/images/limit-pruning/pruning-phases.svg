<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .phase-title { font-size: 13px; font-weight: 700; fill: #222; text-anchor: middle; }
    .desc { font-size: 10.5px; fill: #555; text-anchor: middle; }
    .icon { font-size: 28px; text-anchor: middle; }
  </style>

  <!-- Phase 1 -->
  <rect x="20" y="30" width="220" height="200" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text class="phase-title" x="130" y="55" fill="#1565c0">Phase 1: High-Level Discovery</text>
  <line x1="45" y1="62" x2="215" y2="62" stroke="#90caf9" stroke-width="1"/>

  <rect x="40" y="75" width="180" height="55" rx="6" fill="#fff" stroke="#bbdefb" stroke-width="1"/>
  <text class="icon" x="130" y="100">&#128193;</text>
  <text class="desc" x="130" y="120" font-weight="600">Partition Pruning</text>

  <line x1="130" y1="133" x2="130" y2="145" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="40" y="150" width="180" height="55" rx="6" fill="#fff" stroke="#bbdefb" stroke-width="1"/>
  <text class="icon" x="130" y="175">&#128196;</text>
  <text class="desc" x="130" y="195" font-weight="600">File Stats Pruning</text>

  <text class="desc" x="130" y="250">Eliminates directories</text>
  <text class="desc" x="130" y="264">and files via min/max stats</text>

  <!-- Arrow -->
  <line x1="245" y1="130" x2="280" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 2 -->
  <rect x="285" y="30" width="220" height="200" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="1.5"/>
  <text class="phase-title" x="395" y="55" fill="#e65100">Phase 2: Row Group Stats</text>
  <line x1="310" y1="62" x2="480" y2="62" stroke="#ffcc80" stroke-width="1"/>

  <rect x="305" y="75" width="180" height="55" rx="6" fill="#fff" stroke="#ffe0b2" stroke-width="1"/>
  <text class="icon" x="395" y="100">&#128202;</text>
  <text class="desc" x="395" y="120" font-weight="600">Min/Max/Null Stats</text>

  <line x1="395" y1="133" x2="395" y2="145" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="305" y="150" width="180" height="55" rx="6" fill="#fff" stroke="#ffe0b2" stroke-width="1"/>
  <text class="icon" x="395" y="175">&#127808;</text>
  <text class="desc" x="395" y="195" font-weight="600">Bloom Filters</text>

  <text class="desc" x="395" y="250">Eliminates row groups</text>
  <text class="desc" x="395" y="264">that cannot match the predicate</text>

  <!-- Arrow -->
  <line x1="510" y1="130" x2="545" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 3 -->
  <rect x="550" y="30" width="230" height="200" rx="10" fill="#f3e5f5" stroke="#8e24aa" stroke-width="1.5"/>
  <text class="phase-title" x="665" y="55" fill="#6a1b9a">Phase 3: Granular Pruning</text>
  <line x1="575" y1="62" x2="755" y2="62" stroke="#ce93d8" stroke-width="1"/>

  <rect x="570" y="75" width="190" height="55" rx="6" fill="#fff" stroke="#e1bee7" stroke-width="1"/>
  <text class="icon" x="665" y="100">&#128209;</text>
  <text class="desc" x="665" y="120" font-weight="600">Page Index Pruning</text>

  <line x1="665" y1="133" x2="665" y2="145" stroke="#555" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="570" y="150" width="190" height="55" rx="6" fill="#fff" stroke="#e1bee7" stroke-width="1"/>
  <text class="icon" x="665" y="175">&#9889;</text>
  <text class="desc" x="665" y="195" font-weight="600">Late Materialization</text>

  <text class="desc" x="665" y="250">Skips pages and decodes</text>
  <text class="desc" x="665" y="264">cheap columns first</text>

  <!-- Bottom summary -->
  <rect x="150" y="285" width="500" height="30" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="305" text-anchor="middle" font-size="12" fill="#555" font-weight="600" font-family="'Segoe UI', Arial, sans-serif">Each phase eliminates data so the next phase processes less</text>
</svg>
