<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 14px; font-weight: 700; fill: #222; }
    .cell { font-size: 11px; fill: #444; }
    .header { font-size: 11px; fill: #fff; font-weight: 600; }
    .check { fill: #27ae60; font-size: 12px; }
    .cross { fill: #c0392b; font-size: 12px; }
  </style>

  <!-- Not Matching -->
  <rect x="10" y="10" width="240" height="130" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text class="title" x="130" y="30" text-anchor="middle" fill="#c0392b">Not Matching (Skipped)</text>
  <text class="cell" x="20" y="50">RG1</text>
  <rect x="20" y="55" width="220" height="20" rx="3" fill="#c0392b"/>
  <text class="header" x="70" y="69">SPECIES</text>
  <text class="header" x="190" y="69">S</text>
  <rect x="20" y="75" width="220" height="18" rx="0" fill="#fff" stroke="#eee"/>
  <text class="cell" x="70" y="88" text-anchor="middle">Snow Vole</text>
  <text class="cell" x="190" y="88" text-anchor="middle">7</text>
  <rect x="20" y="93" width="220" height="18" rx="0" fill="#f9f9f9" stroke="#eee"/>
  <text class="cell" x="70" y="106" text-anchor="middle">Brown Bear</text>
  <text class="cell" x="190" y="106" text-anchor="middle">133</text>
  <rect x="20" y="111" width="220" height="18" rx="0" fill="#fff" stroke="#eee"/>
  <text class="cell" x="70" y="124" text-anchor="middle">Gray Wolf</text>
  <text class="cell" x="190" y="124" text-anchor="middle">82</text>

  <!-- Partially Matching -->
  <rect x="270" y="10" width="250" height="130" rx="6" fill="#fff8e1" stroke="#f39c12" stroke-width="1.5"/>
  <text class="title" x="395" y="30" text-anchor="middle" fill="#e67e22">Partially Matching</text>
  <text class="cell" x="280" y="50">RG2</text>
  <rect x="280" y="55" width="230" height="20" rx="3" fill="#f39c12"/>
  <text class="header" x="340" y="69">SPECIES</text>
  <text class="header" x="460" y="69">S</text>
  <rect x="280" y="75" width="230" height="18" fill="#fff" stroke="#eee"/>
  <text class="cell" x="340" y="88" text-anchor="middle">Lynx</text>
  <text class="cell" x="460" y="88" text-anchor="middle">71</text>
  <rect x="280" y="93" width="230" height="18" fill="#f9f9f9" stroke="#eee"/>
  <text class="cell" x="340" y="106" text-anchor="middle">Red Fox</text>
  <text class="cell" x="460" y="106" text-anchor="middle">40</text>
  <rect x="280" y="111" width="230" height="18" fill="#fff" stroke="#eee"/>
  <text class="cell" x="340" y="124" text-anchor="middle">Alpine Bat</text>
  <text class="cell" x="460" y="124" text-anchor="middle">6</text>

  <!-- Fully Matching -->
  <rect x="540" y="10" width="250" height="130" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text class="title" x="665" y="30" text-anchor="middle" fill="#27ae60">Fully Matching</text>
  <text class="cell" x="550" y="50">RG3</text>
  <rect x="550" y="55" width="230" height="20" rx="3" fill="#27ae60"/>
  <text class="header" x="620" y="69">SPECIES</text>
  <text class="header" x="730" y="69">S</text>
  <rect x="550" y="75" width="230" height="18" fill="#fff" stroke="#eee"/>
  <text class="cell" x="620" y="88" text-anchor="middle">Alpine Ibex</text>
  <text class="cell" x="730" y="88" text-anchor="middle">101</text>
  <text class="check" x="770" y="88">&#10003;</text>
  <rect x="550" y="93" width="230" height="18" fill="#f9f9f9" stroke="#eee"/>
  <text class="cell" x="620" y="106" text-anchor="middle">Alpine Goat</text>
  <text class="cell" x="730" y="106" text-anchor="middle">76</text>
  <text class="check" x="770" y="106">&#10003;</text>
  <rect x="550" y="111" width="230" height="18" fill="#fff" stroke="#eee"/>
  <text class="cell" x="620" y="124" text-anchor="middle">Alpine Sheep</text>
  <text class="cell" x="730" y="124" text-anchor="middle">83</text>
  <text class="check" x="770" y="124">&#10003;</text>

  <!-- Bottom: query -->
  <text x="400" y="165" text-anchor="middle" font-size="13" fill="#555" font-family="'Courier New', monospace">WHERE species LIKE 'Alpine%' AND s >= 50 LIMIT 3</text>

  <!-- Legend -->
  <rect x="180" y="185" width="14" height="14" rx="2" fill="#fde8e8" stroke="#c0392b"/>
  <text x="200" y="196" font-size="11" fill="#444" font-family="'Segoe UI', Arial, sans-serif">Statistics prove no match → Skip</text>
  <rect x="180" y="210" width="14" height="14" rx="2" fill="#fff8e1" stroke="#f39c12"/>
  <text x="200" y="221" font-size="11" fill="#444" font-family="'Segoe UI', Arial, sans-serif">Cannot rule out → Must scan to verify</text>
  <rect x="180" y="235" width="14" height="14" rx="2" fill="#e8f5e9" stroke="#27ae60"/>
  <text x="200" y="246" font-size="11" fill="#444" font-family="'Segoe UI', Arial, sans-serif">All rows guaranteed to match → Fully matched</text>
</svg>
